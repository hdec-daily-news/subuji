<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>수도권 부동산 지도</title>
<meta name="description" content="국토부 실거래가 기반 수도권 아파트 급지·시세·정비사업 지도">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Outfit:wght@400;600;800&display=swap">
<style>
:root{
  /* 하늘색 테마 (competitors 초록 팔레트를 sky blue 로 치환) */
  --bg:#e9f3fb; --card:#ffffff; --tx:#16262f; --mut:#5d6f79; --line:#dde9f1;
  --accent:#1c93e0; --accent-ink:#0f5a80; --tint:#eaf4fb;
  --shadow:rgba(20,80,120,.16); --ring:rgba(120,190,240,.30);
}
@media (prefers-color-scheme:dark){
  :root{--bg:#0e1519;--card:#161d23;--tx:#e6edf2;--mut:#93a1ab;--line:#26313a;
    --accent:#4cb0f5;--accent-ink:#8fd0f8;--tint:#132430;
    --shadow:rgba(0,0,0,.4);--ring:rgba(76,176,245,.28)}
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--tx);
  font:15px/1.65 "Noto Sans KR",-apple-system,BlinkMacSystemFont,"Malgun Gothic",sans-serif;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  letter-spacing:-0.005em}
/* 숫자는 Outfit(라틴 전용) → 한글은 Noto로 자동 폴백 */
.stat b,.gcard .num,.big,.knum{font-family:"Outfit","Noto Sans KR",sans-serif;
  letter-spacing:-0.01em}
/* 헤더+탭을 하나의 sticky 블록으로 묶는다.
   예전엔 nav 를 top:60px 로 고정했는데, 헤더 높이가 화면폭에 따라 달라져
   탭바가 어긋나거나 본문과 겹쳤다. */
.topbar{position:sticky;top:0;z-index:30;background:var(--card);
  border-bottom:1px solid var(--line);box-shadow:0 4px 20px -8px var(--shadow)}
header{padding:11px 16px 9px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.brand .logo{width:31px;height:31px;border-radius:9px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;flex:0 0 auto}
h1{margin:0;font-size:19px;font-weight:800;letter-spacing:-.02em;
  display:flex;align-items:baseline;gap:8px;white-space:nowrap}
h1 .tag{font-size:12.5px;font-weight:500;color:var(--mut);letter-spacing:0}
.stats{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.stat{background:var(--bg);border:1px solid var(--line);border-radius:8px;
  padding:5px 10px;font-size:12px;color:var(--mut);white-space:nowrap}
.stat b{color:var(--tx);font-weight:700}
@media(max-width:640px){
  header{padding:9px 14px 7px;flex-wrap:wrap;gap:7px}
  h1{font-size:17px} h1 .tag{display:none}
  .stats{width:100%;justify-content:flex-start;gap:5px}
  .stat{padding:4px 8px;font-size:11px}
}
nav{display:flex;gap:6px;overflow-x:auto;padding:8px 12px 10px;background:var(--card);
  -webkit-overflow-scrolling:touch}
nav button{flex:0 0 auto;border:1px solid var(--line);background:transparent;color:var(--mut);
  padding:7px 13px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer}
nav button.on{background:var(--accent);border-color:var(--accent);color:#fff}
main{padding:14px 12px 60px;max-width:1100px;margin:0 auto}
section{display:none} section.on{display:block}
/* 탭 전환 시 부드럽게 등장 (지도 탭은 제외 — 큰 캔버스라 깜빡임 방지) */
main section.on{animation:fadeUp .3s cubic-bezier(.22,.61,.36,1)}
#s-map.on{animation:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
nav button,.card,.gcard,.lgchip,.klgrow,.kzoom button,.mbtn{
  transition:background .16s ease,border-color .16s ease,color .16s ease,
  box-shadow .18s ease,transform .12s ease}
.gcard:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.08)}
.item:hover{background:var(--bg)}
button{font-family:inherit}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;
  margin-bottom:12px;box-shadow:0 8px 30px -14px var(--shadow)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.gcard{border-left:5px solid;border-radius:10px;background:var(--card);padding:10px 12px;
  border-top:1px solid var(--line);border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
.gcard .lb{font-weight:700;font-size:14px}
.gcard .bd{font-size:11px;color:var(--mut)}
.gcard .num{font-size:22px;font-weight:800;margin-top:4px}
.gcard .avg{font-size:11px;color:var(--mut)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}
th{color:var(--mut);font-weight:600;font-size:12px}
.scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
/* 좁은 화면에서는 표가 화면폭을 넘어가 핵심 열(상승률 등)이 안 보였다.
   보조 열을 숨겨서 스크롤 없이 핵심만 보이게 한다. */
@media (max-width:640px){
  .hide-sm{display:none}
  th,td{padding:7px 4px;font-size:12.5px}
  td.nm{max-width:104px;overflow:hidden;text-overflow:ellipsis}
}
.tag{display:inline-block;padding:2px 7px;border-radius:6px;font-size:11px;font-weight:700;color:#fff}
/* 지도 범례(칩) — 이전엔 12px 라 눈에 안 들어왔다. 키우고 줄바꿈 정리 */
.maptip{margin-top:10px;font-size:14px;line-height:1.6}
.maptip .muted{font-size:12.5px}
/* 범례 칩: 이름 위 / 가격대·개수 아래로 쌓아 폭을 줄였다.
   한 줄에 6개가 들어가면서도 글씨는 크게 유지된다. */
.lgwrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
/* ON = 급지 색으로 꽉 채움(흰 글씨), OFF = 빈 배경+점선 회색.
   투명도에 의존하지 않아 켜짐/꺼짐이 한눈에 구분된다. */
.lgchip{flex:1 1 148px;display:inline-flex;align-items:center;gap:8px;
  cursor:pointer;user-select:none;padding:7px 10px;border-radius:9px;
  border:2px solid var(--gc);background:var(--gc)}
.lgchip .dot{border-radius:50%;display:inline-block;flex:0 0 auto;
  background:#fff;border:2px solid rgba(255,255,255,.85)}
.lgchip .lgtxt{display:flex;flex-direction:column;line-height:1.25;min-width:0}
.lgchip .lgtxt b{font-size:15px;color:#fff;white-space:nowrap}
.lgchip .lgtxt span{font-size:11.5px;color:rgba(255,255,255,.85);white-space:nowrap}
.lgchip:hover{filter:brightness(1.1)}
.lgchip.off{background:transparent;border-style:dashed;border-color:var(--line)}
.lgchip.off .dot{background:transparent;border-color:var(--mut)}
.lgchip.off .lgtxt b{color:var(--mut)}
.lgchip.off .lgtxt span{color:var(--mut)}
@media (max-width:640px){ .lgchip{flex:1 1 132px} .lgchip .lgtxt b{font-size:14px} }
/* ── 카카오맵 스타일 전면 지도 ── */
.kmap{position:relative;margin:-14px -12px 0;min-height:460px;background:var(--bg);overflow:hidden}
.kmap #mapdiv{position:absolute;inset:0}
.kf{position:absolute;z-index:6}
.ksearch{top:12px;left:12px;right:12px;max-width:480px;display:flex;align-items:center;gap:9px;
  background:var(--card);border:1px solid var(--line);border-radius:12px;
  box-shadow:0 4px 18px rgba(0,0,0,.16);padding:11px 14px}
.ksearch span.ic{font-size:17px;line-height:1}
.ksearch input{border:0;outline:0;background:transparent;flex:1;font-size:15px;color:var(--tx);padding:0}
.ksug{position:absolute;top:60px;left:12px;right:12px;max-width:480px;z-index:7;background:var(--card);
  border:1px solid var(--line);border-radius:12px;overflow:hidden auto;max-height:46vh;
  box-shadow:0 10px 28px rgba(0,0,0,.2)}
.ksug div{padding:11px 14px;border-bottom:1px solid var(--line);cursor:pointer;font-size:14px;
  display:flex;justify-content:space-between;gap:10px;align-items:center}
.ksug div:last-child{border-bottom:0}
.ksug div:hover{background:var(--bg)}
/* 범례 = 급지 토글 6개를 한 줄로. 검색바 아래에 떠 있고, 좁으면 가로 스크롤 */
.klg{left:12px;right:12px;top:64px;display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;justify-content:flex-start}
.klg::-webkit-scrollbar{display:none}
.klgrow{flex:0 0 auto;display:flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap;
  background:var(--card);border:1.5px solid var(--gc);border-radius:999px;padding:6px 10px;
  box-shadow:0 4px 16px -10px var(--shadow);transition:opacity .15s,border-color .15s}
.klgrow .kd{border-radius:50%;flex:0 0 auto}
.klgrow b{font-size:12px}
.klgrow .kn{display:none}
.klgrow.off{opacity:.55;border-style:dashed;border-color:var(--line)}
.klgrow.off .kd{background:transparent!important;border:2px solid var(--mut)}
.klgrow.off b{color:var(--mut)!important}
.klgrow:hover{background:var(--bg)}
.klgrow .kd{border-radius:50%;flex:0 0 auto}
.klgrow.off{opacity:.42}
.klgrow.off .kd{background:transparent!important;border:2px solid var(--mut)}
.klgrow b{font-size:13px}
.klgrow .kn{color:var(--mut);font-size:11px;margin-left:auto}
.kzoom{right:12px;bottom:16px;display:flex;flex-direction:column;background:var(--card);
  border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,.16)}
.kzoom button{border:0;background:transparent;width:44px;height:44px;font-size:20px;color:var(--tx);
  cursor:pointer;padding:0;line-height:1}
.kzoom button:hover{background:var(--bg)}
.kzoom button+button{border-top:1px solid var(--line)}
.ksheet{position:absolute;left:12px;right:12px;bottom:-120%;z-index:8;max-width:480px;
  background:var(--card);border:1px solid var(--line);border-radius:16px 16px 12px 12px;
  box-shadow:0 -8px 30px rgba(0,0,0,.22);padding:16px 16px 18px;transition:bottom .28s ease}
.ksheet.open{bottom:16px}
.ksheet .kx{position:absolute;top:11px;right:13px;font-size:22px;color:var(--mut);cursor:pointer;line-height:1}
input,select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;
  background:var(--card);color:var(--tx);font-size:14px}
label{font-size:12px;color:var(--mut);display:block;margin:8px 0 4px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.muted{color:var(--mut);font-size:12px}
h2{font-size:16px;margin:0 0 4px} h3{font-size:15px;margin:16px 0 6px}
h4{font-size:14px;margin:12px 0 4px}
a{color:var(--accent);text-decoration:none}
.item{padding:9px 0;border-bottom:1px solid var(--line)}
.item .t{font-size:14px;font-weight:600}
.item .m{font-size:11px;color:var(--mut);margin-top:3px}
.chart{width:100%;height:380px}
.ok{color:#16a34a;font-weight:700} .no{color:#dc2626;font-weight:700}
.big{font-size:20px;font-weight:800}
blockquote{margin:8px 0;padding:8px 12px;border-left:3px solid var(--line);color:var(--mut)}
</style>
</head>
<body>
<div class="topbar">
  <header>
    <div class="brand">
      <span class="logo"><svg viewBox="0 0 24 24" width="18" height="18" fill="none"
        stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 21s7-6.3 7-11a7 7 0 0 0-14 0c0 4.7 7 11 7 11Z"/><circle cx="12" cy="10" r="2.3"/></svg></span>
      <h1>수부지<span class="tag">수도권 부동산 지도</span></h1>
    </div>
    <div class="stats" id="meta"></div>
  </header>
  <nav id="nav"></nav>
</div>
<main>
  <section id="s-map" class="on"></section>
  <section id="s-grade"></section>
  <section id="s-flag"></section>
  <section id="s-search"></section>
  <section id="s-cmp"></section>
  <section id="s-redev"></section>
  <section id="s-report"></section>
  <section id="s-calc"></section>
</main>

<script>
const TABS=[["s-map","🗺️ 지도"],["s-grade","🏆 급지"],["s-flag","👑 대장단지"],
            ["s-search","🔎 단지검색"],["s-cmp","⚖️ 단지비교"],["s-redev","🏗️ 정비사업"],
            ["s-report","📰 리포트"],["s-calc","💰 자금"]];
let D=null;
const eok=v=>v==null?"-":(v/10000).toFixed(1)+"억";
const el=id=>document.getElementById(id);
const esc=s=>String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

function nav(){
  el("nav").innerHTML=TABS.map(([id,t],i)=>
    `<button data-t="${id}" class="${i?'':'on'}">${t}</button>`).join("");
  el("nav").onclick=e=>{
    const b=e.target.closest("button"); if(!b)return;
    document.querySelectorAll("nav button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    document.querySelectorAll("main section").forEach(s=>s.classList.remove("on"));
    el(b.dataset.t).classList.add("on");
    if(b.dataset.t==="s-map")drawMap();
    if(b.dataset.t==="s-redev")drawRedevMap();
  };
}
const gcolor=g=>(D.grades.find(x=>x.g===g)||{}).color||"#888";
const glabel=g=>(D.grades.find(x=>x.g===g)||{}).label||"-";

// 서울이 화면 너비를 꽉 채우는 줌을 계산한다.
// 서울 동서 폭 약 34km. 위도 37.55에서 1픽셀당 미터 = 156543*cos(lat)/2^zoom.
const SEOUL={lat:37.5560,lon:126.9910};
function seoulZoom(node){
  const w=(node&&node.clientWidth)||window.innerWidth||375;
  const z=Math.log2(156543*Math.cos(SEOUL.lat*Math.PI/180)*w/34000);
  return Math.max(9.6,Math.min(12.2,z));
}
// 스크롤(휠)·핀치 확대 허용
const MAPCFG={displayModeBar:false,responsive:true,scrollZoom:true};
// 범례를 지도 위에 겹치지 않게: 상단에 여백을 확보하고 그 안에 범례를 넣는다.
// 글씨를 키운 만큼 여백(t)도 같이 늘려야 지도와 겹치지 않는다.
const MAPMARGIN={l:0,r:0,t:48,b:0};
const MAPLEGEND={orientation:"h",y:1,yanchor:"bottom",x:0,xanchor:"left",
                 font:{size:14},bgcolor:"rgba(0,0,0,0)",
                 itemsizing:"constant"};

function renderGrade(){
  const cards=D.grades.map(g=>`<div class="gcard" style="border-left-color:${g.color}">
    <div class="lb" style="color:${g.color}">${g.label}</div>
    <div class="bd">${g.band}</div>
    <div class="num">${g.count.toLocaleString()}</div>
    <div class="avg">평균 ${eok(g.avg)}</div></div>`).join("");
  const lists=D.grades.map(g=>{
    const rows=D.complexes.filter(c=>c.g===g.g).sort((a,b)=>b.p84-a.p84).slice(0,50)
      .map(c=>`<tr><td>${esc(c.gu)}</td><td class="hide-sm">${esc(c.dong)}</td>
        <td class="nm"><b>${esc(c.nm)}</b></td>
        <td>${eok(c.p84)}</td><td class="hide-sm">${c.hh??"-"}</td>
        <td class="hide-sm">${c.by??"-"}</td></tr>`).join("");
    return `<details><summary style="padding:10px 0;font-weight:700;color:${g.color};cursor:pointer">
      ${g.label} · ${g.band} — ${g.count.toLocaleString()}개</summary>
      <div class="muted" style="margin-bottom:6px">${esc(g.desc)}</div>
      <div class="scroll"><table><tr><th>구</th><th class="hide-sm">동</th><th>단지</th>
      <th>84환산</th><th class="hide-sm">세대</th><th class="hide-sm">준공</th></tr>
      ${rows}</table></div><div class="muted">상위 50개만 표시</div></details>`;
  }).join("");
  // 급지별 분위수를 직접 계산해서 한글 표로 보여준다.
  // (Plotly 박스플롯 기본 툴팁은 q1/q3 같은 영문 약어라 알아보기 어렵다)
  const quart=(arr,p)=>{const v=arr.slice().sort((a,b)=>a-b);
    const i=(v.length-1)*p, lo=Math.floor(i), hi=Math.ceil(i);
    return v[lo]+(v[hi]-v[lo])*(i-lo);};
  const statRows=D.grades.map(g=>{
    const v=D.complexes.filter(c=>c.g===g.g).map(c=>c.p84/10000);
    if(!v.length)return "";
    const f=x=>x.toFixed(1)+"억";
    return `<tr><td><b style="color:${g.color}">${g.label}</b></td>
      <td>${f(Math.min(...v))}</td><td>${f(quart(v,.25))}</td>
      <td><b>${f(quart(v,.5))}</b></td><td>${f(quart(v,.75))}</td>
      <td>${f(Math.max(...v))}</td></tr>`;
  }).join("");

  el("s-grade").innerHTML=`<div class="card"><h2>급지 현황</h2>
    <div class="muted">최근 6개월 매매 실거래의 평단가 중앙값을 전용 84(25.41평)로 환산해 자동 산출</div></div>
    <div class="grid">${cards}</div>
    <div class="card" style="margin-top:12px"><div id="gchart" class="chart"></div>
      <div class="scroll"><table>
        <tr><th>급지</th><th>최저</th><th>하위25%</th><th>중앙값</th><th>상위25%</th><th>최고</th></tr>
        ${statRows}</table></div>
      <div class="muted" style="margin-top:8px">
        상자의 왼쪽 끝이 <b>하위25%</b>, 오른쪽 끝이 <b>상위25%</b>입니다.
        즉 <b>상자 안에 그 급지 단지의 가운데 절반</b>이 들어있습니다.</div>
    </div>
    <div class="card">${lists}</div>`;

  const tr=D.grades.map(g=>({
    type:"box", x:D.complexes.filter(c=>c.g===g.g).map(c=>c.p84/10000),
    name:g.label, marker:{color:g.color}, orientation:"h", boxpoints:false,
    hoverinfo:"skip"}));   // 영문 q1/q3 툴팁 대신 위 한글 표를 쓴다
  Plotly.newPlot("gchart",tr,{margin:{l:70,r:10,t:10,b:36},showlegend:false,
    xaxis:{title:"전용 84 환산가(억)"},paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",
    font:{color:getComputedStyle(document.body).color}},{displayModeBar:false,responsive:true});
}
// 급지별 마커 크기·투명도. 상급지일수록 크고 진하게 해서
// 지도 위에서 '상급지 벨트'가 먼저 눈에 들어오도록 한다.
const MSIZE={1:13,2:10.5,3:8.5,4:7,5:6,6:5};
const MOPAC={1:.95,2:.88,3:.78,4:.62,5:.5,6:.38};
let MAPTRACE={};   // 급지 -> trace 인덱스

// 전면 지도 높이를 화면 아래까지 채운다 (카카오맵처럼).
function sizeMap(){
  const wrap=document.querySelector(".kmap"); if(!wrap)return;
  const top=wrap.getBoundingClientRect().top;
  wrap.style.height=Math.max(460, window.innerHeight-top-66)+"px";
  const m=el("mapdiv"); if(m&&m.dataset.done)Plotly.Plots.resize(m);
}
window.addEventListener("resize",()=>{
  if(el("s-map")&&el("s-map").classList.contains("on"))sizeMap();
});

function drawMap(force){
  const m=el("mapdiv");
  if(!m)return;
  sizeMap();
  if(m.dataset.done && !force){Plotly.Plots.resize(m);return;}

  // 그리는 순서: 하급지 먼저 → 최상급지를 맨 위에 (겹침 방지)
  const order=D.grades.slice().sort((a,b)=>b.g-a.g);
  MAPTRACE={};
  order.forEach((g,i)=>{MAPTRACE[g.g]=i;});
  const tr=order.map(g=>{
    const pts=D.complexes.filter(c=>c.g===g.g&&c.lat);
    return {type:"scattermapbox",mode:"markers",name:g.label,legendrank:g.g,
      lat:pts.map(p=>p.lat),lon:pts.map(p=>p.lon),
      // 클릭 시 상세시트에 쓸 정보를 통째로 실어둔다
      customdata:pts.map(p=>[p.nm,p.gu,p.dong,eok(p.p84),
        p.c2==null?"-":(p.c2>0?"+":"")+p.c2.toFixed(0)+"%",p.hh,p.by,p.g]),
      hovertemplate:"<b>%{customdata[0]}</b><br>%{customdata[1]} %{customdata[2]}<br>"+
                    "84환산 %{customdata[3]} · 2년 %{customdata[4]}<extra></extra>",
      marker:{size:MSIZE[g.g]||6,color:g.color,opacity:MOPAC[g.g]||.5}};
  });

  Plotly.newPlot("mapdiv",tr,{
    mapbox:{style:"carto-positron",center:SEOUL,zoom:seoulZoom(m)},
    margin:{l:0,r:0,t:0,b:0},showlegend:false,
    paper_bgcolor:"rgba(0,0,0,0)"},MAPCFG);
  m.on("plotly_click",ev=>{if(ev.points&&ev.points[0])openSheet(ev.points[0].customdata);});
  m.dataset.done=1;
}

// 마커/검색 결과 클릭 → 하단 상세시트
function openSheet(cd){
  const [nm,gu,dong,p84,c2,hh,by,g]=cd;
  const reg=(D.regs||{})[gu];
  const c2col=String(c2).startsWith("+")?"#dc2626":String(c2).startsWith("-")?"#2563eb":"var(--tx)";
  el("ksheet").innerHTML=`<span class="kx" id="kxc">×</span>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
      <b style="font-size:16px">${esc(nm)}</b>
      <span style="font-size:11px;background:${gcolor(g)};color:#fff;padding:2px 8px;border-radius:7px">${glabel(g)}</span></div>
    <div class="muted" style="margin-bottom:12px">${esc(gu)} ${esc(dong)}${reg?` · <span style="color:#dc2626">${esc(reg)}</span>`:""}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div><div class="muted" style="font-size:11px">84환산가</div><div class="knum" style="font-size:19px;font-weight:800">${p84}</div></div>
      <div><div class="muted" style="font-size:11px">상승률(2년)</div><div class="knum" style="font-size:19px;font-weight:800;color:${c2col}">${c2}</div></div>
      <div><div class="muted" style="font-size:11px">세대수</div><div style="font-size:15px">${hh?Number(hh).toLocaleString():"-"}</div></div>
      <div><div class="muted" style="font-size:11px">준공</div><div style="font-size:15px">${by||"-"}</div></div>
    </div>`;
  el("ksheet").classList.add("open");
  el("kxc").onclick=()=>el("ksheet").classList.remove("open");
}

function renderMap(){
  const rows=D.grades.map(g=>{
    const s=Math.min(11,Math.round(MSIZE[g.g]));
    const short=g.label.replace("급지","");
    return `<div class="klgrow" data-g="${g.g}" style="--gc:${g.color}">
      <span class="kd" style="width:${s}px;height:${s}px;background:${g.color}"></span>
      <b style="color:${g.color}">${short}</b></div>`;
  }).join("");
  el("s-map").innerHTML=`<div class="kmap">
    <div class="kf ksearch"><span class="ic">🔍</span>
      <input id="ksq" placeholder="단지명 검색 (예: 은마, 자이)" autocomplete="off"></div>
    <div class="ksug" id="ksug" style="display:none"></div>
    <div class="kf klg" id="klg">${rows}</div>
    <div class="kf kzoom">
      <button id="kzi" aria-label="확대">＋</button>
      <button id="kzo" aria-label="축소">－</button>
      <button id="kzr" aria-label="서울 전체" title="서울 전체 보기">⤢</button></div>
    <div class="ksheet" id="ksheet"></div>
    <div id="mapdiv"></div>
  </div>`;

  // 급지 칩 클릭 = 해당 급지 켜기/끄기
  el("klg").addEventListener("click",e=>{
    const row=e.target.closest(".klgrow"); if(!row)return;
    const idx=MAPTRACE[+row.dataset.g]; if(idx==null)return;
    const off=row.classList.toggle("off");
    Plotly.restyle("mapdiv",{visible:off?"legendonly":true},[idx]);
  });

  // 검색 → 자동완성 → 선택 시 지도 이동 + 상세시트
  const box=el("ksug");
  el("ksq").addEventListener("input",()=>{
    const q=el("ksq").value.trim();
    if(!q){box.style.display="none";return;}
    const hits=D.complexes.filter(c=>c.lat&&c.nm.includes(q))
      .sort((a,b)=>b.p84-a.p84).slice(0,10);
    if(!hits.length){box.style.display="none";return;}
    box.innerHTML=hits.map(c=>`<div data-k="${esc(ckey(c))}">
      <span><b>${esc(c.nm)}</b> <span class="muted">${esc(c.gu)} ${esc(c.dong)}</span></span>
      <span style="color:${gcolor(c.g)};font-weight:700">${eok(c.p84)}</span></div>`).join("");
    box.style.display="block";
  });
  box.addEventListener("click",e=>{
    const d=e.target.closest("[data-k]"); if(!d)return;
    const c=D.complexes.find(x=>ckey(x)===d.dataset.k); if(!c)return;
    box.style.display="none"; el("ksq").value=c.nm;
    Plotly.relayout("mapdiv",{"mapbox.center":{lat:c.lat,lon:c.lon},"mapbox.zoom":14.5});
    openSheet([c.nm,c.gu,c.dong,eok(c.p84),
      c.c2==null?"-":(c.c2>0?"+":"")+c.c2.toFixed(0)+"%",c.hh,c.by,c.g]);
  });

  // 확대/축소/전체
  const curZoom=()=>{const m=el("mapdiv");
    return (m._fullLayout&&m._fullLayout.mapbox&&m._fullLayout.mapbox.zoom)||seoulZoom(m);};
  el("kzi").onclick=()=>Plotly.relayout("mapdiv",{"mapbox.zoom":Math.min(18,curZoom()+1)});
  el("kzo").onclick=()=>Plotly.relayout("mapdiv",{"mapbox.zoom":Math.max(6,curZoom()-1)});
  el("kzr").onclick=()=>{el("ksheet").classList.remove("open");
    Plotly.relayout("mapdiv",{"mapbox.center":SEOUL,"mapbox.zoom":seoulZoom(el("mapdiv"))});};
}

// 상승률 표시: +50% / -12% 형태, 상승 빨강 · 하락 파랑
function pct(v){
  if(v==null)return `<span class="muted">-</span>`;
  const s=(v>0?"+":"")+v.toFixed(0)+"%";
  return `<b style="color:${v>0?"#dc2626":v<0?"#2563eb":"var(--mut)"}">${s}</b>`;
}
function renderSearch(){
  const gus=[...new Set(D.complexes.map(c=>c.gu))].sort();
  const bm=(D.meta.base_months||[]).map(m=>m.slice(0,4)+"."+m.slice(4)).join(", ");
  el("s-search").innerHTML=`<div class="card"><h2>단지 검색</h2>
    <label>단지명 검색</label><input id="q" placeholder="예: 은마, 래미안, 자이">
    <div class="row"><div><label>구</label><select id="fgu">
      <option value="">전체</option>${gus.map(g=>`<option>${g}</option>`).join("")}</select></div>
      <div><label>급지</label><select id="fg"><option value="">전체</option>
      ${D.grades.map(g=>`<option value="${g.g}">${g.label}</option>`).join("")}</select></div></div>
    <div class="row"><div><label>정렬</label><select id="fs">
      <option value="p84">84환산가 높은순</option>
      <option value="c2">상승률(2년) 높은순</option>
      <option value="c2a">상승률(2년) 낮은순</option></select></div>
      <div><label>거래 최소건수</label><select id="fn">
      <option value="0">전체</option><option value="3">양쪽 3건 이상</option>
      <option value="5">양쪽 5건 이상</option></select></div></div>
    <div class="muted" style="margin-top:8px">상승률(2년) = <b>${bm||"2년 전 3개월"}</b> 실거래 평단가 기준
      전용 84 환산가 대비 현재 상승률</div>
    </div><div class="card scroll" id="sres"></div>`;
  const run=()=>{
    const q=el("q").value.trim(), gu=el("fgu").value, g=el("fg").value,
          srt=el("fs").value, minn=+el("fn").value;
    let r=D.complexes;
    if(q)r=r.filter(c=>c.nm.includes(q));
    if(gu)r=r.filter(c=>c.gu===gu);
    if(g)r=r.filter(c=>c.g===+g);
    if(minn)r=r.filter(c=>c.n>=minn&&c.n2>=minn);
    if(srt==="c2")r=r.filter(c=>c.c2!=null).sort((a,b)=>b.c2-a.c2);
    else if(srt==="c2a")r=r.filter(c=>c.c2!=null).sort((a,b)=>a.c2-b.c2);
    else r=r.slice().sort((a,b)=>b.p84-a.p84);
    r=r.slice(0,200);
    el("sres").innerHTML=`<div class="muted" style="margin-bottom:6px">${r.length}개 표시 (최대 200)</div>
      <table><tr><th>구</th><th class="hide-sm">동</th><th>단지</th><th>급지</th><th>84환산</th>
      <th>상승률<span class="hide-sm">(2년)</span></th><th class="hide-sm">2년전</th>
      <th class="hide-sm">규제</th>
      <th class="hide-sm">세대</th><th class="hide-sm">준공</th><th class="hide-sm">거래</th></tr>
      ${r.map(c=>`<tr><td>${esc(c.gu)}</td><td class="hide-sm">${esc(c.dong)}</td>
      <td class="nm"><b>${esc(c.nm)}</b></td>
      <td><span class="tag" style="background:${gcolor(c.g)}">${glabel(c.g)}</span></td>
      <td>${eok(c.p84)}</td><td>${pct(c.c2)}</td>
      <td class="muted hide-sm">${c.p2?eok(c.p2):"-"}</td>
      <td class="hide-sm" style="font-size:11px">${(D.regs||{})[c.gu]
        ? `<span style="color:#dc2626">${esc(D.regs[c.gu])}</span>` : `<span class="muted">-</span>`}</td>
      <td class="hide-sm">${c.hh??"-"}</td><td class="hide-sm">${c.by??"-"}</td>
      <td class="hide-sm">${c.n}</td></tr>`).join("")}</table>`;
  };
  ["q","fgu","fg","fs","fn"].forEach(id=>el(id).oninput=run);
  run();
}

// 단지 비교 (최대 5개)

const CMP_MAX=5;
let CMP=[];                       // 선택한 단지 키 목록
const ckey=c=>`${c.gu}|${c.dong}|${c.nm}`;

function renderCmp(){
  el("s-cmp").innerHTML=`<div class="card">
    <h2>⚖️ 단지 비교</h2>
    <div class="muted">최대 ${CMP_MAX}개 단지를 골라 84환산가·상승률·세대수·준공을 나란히 비교합니다.</div>
    <label>단지 검색 후 추가</label>
    <input id="cq" placeholder="단지명 입력 (예: 은마, 래미안, 자이)" autocomplete="off">
    <div id="cnotice" style="display:none;margin-top:8px;padding:8px 10px;border-radius:8px;
      background:rgba(220,38,38,.1);color:#dc2626;font-size:13px;font-weight:600"></div>
    <div id="csug"></div>
    <div id="cpick" class="lgwrap" style="margin-top:10px"></div>
    </div>
    <div id="cout"></div>`;
  el("cq").oninput=suggest;
  el("csug").onclick=e=>{
    const b=e.target.closest("[data-k]"); if(!b)return;
    addCmp(b.dataset.k);
  };
  el("cpick").onclick=e=>{
    const b=e.target.closest("[data-del]"); if(!b)return;
    CMP=CMP.filter(k=>k!==b.dataset.del); cmpNotice(""); drawCmp();
  };
  drawCmp();
}

function suggest(){
  const q=el("cq").value.trim();
  if(!q){el("csug").innerHTML="";return;}
  const hits=D.complexes.filter(c=>c.nm.includes(q)).sort((a,b)=>b.p84-a.p84).slice(0,12);
  el("csug").innerHTML=hits.length
    ? `<div class="scroll" style="margin-top:8px"><table>${hits.map(c=>
        `<tr data-k="${esc(ckey(c))}" style="cursor:pointer">
         <td>${esc(c.gu)}</td><td class="nm"><b>${esc(c.nm)}</b></td>
         <td><span class="tag" style="background:${gcolor(c.g)}">${glabel(c.g)}</span></td>
         <td>${eok(c.p84)}</td><td class="muted">+ 추가</td></tr>`).join("")}</table></div>`
    : `<div class="muted" style="margin-top:8px">검색 결과 없음</div>`;
}

function cmpNotice(msg){
  const n=el("cnotice"); if(!n)return;
  n.textContent=msg||"";
  n.style.display=msg?"block":"none";
}
function addCmp(k){
  if(CMP.includes(k)){ cmpNotice("이미 선택한 단지입니다."); return; }
  // alert() 는 모달이라 화면을 멈춘다. 인라인 안내로 처리한다.
  if(CMP.length>=CMP_MAX){ cmpNotice(`최대 ${CMP_MAX}개까지 비교할 수 있습니다. 하나를 제거한 뒤 추가하세요.`); return; }
  CMP.push(k); el("cq").value=""; el("csug").innerHTML=""; cmpNotice(""); drawCmp();
}

function drawCmp(){
  const picked=CMP.map(k=>D.complexes.find(c=>ckey(c)===k)).filter(Boolean);
  el("cpick").innerHTML=picked.length
    ? picked.map(c=>`<span class="lgchip" data-del="${esc(ckey(c))}" style="--gc:${gcolor(c.g)}">
        <span class="lgtxt"><b>${esc(c.nm)}</b><span>${esc(c.gu)} · 클릭하면 제거</span></span></span>`).join("")
    : `<div class="muted">아직 선택한 단지가 없습니다.</div>`;

  if(!picked.length){ el("cout").innerHTML=""; return; }

  const rows=[
    ["급지", c=>`<span class="tag" style="background:${gcolor(c.g)}">${glabel(c.g)}</span>`],
    ["84환산가", c=>`<b>${eok(c.p84)}</b>`],
    ["상승률(2년)", c=>pct(c.c2)],
    ["2년 전", c=>c.p2?eok(c.p2):`<span class="muted">-</span>`],
    ["세대수", c=>c.hh?c.hh.toLocaleString():"-"],
    ["준공", c=>c.by??"-"],
    ["최근 거래", c=>c.n],
    ["규제", c=>(D.regs||{})[c.gu]
        ? `<span style="color:#dc2626;font-size:11px">${esc(D.regs[c.gu])}</span>`
        : `<span class="muted">비규제</span>`],
  ];
  el("cout").innerHTML=`<div class="card scroll"><table>
    <tr><th>항목</th>${picked.map(c=>
      `<th>${esc(c.nm)}<br><span class="muted" style="font-weight:400">${esc(c.gu)} ${esc(c.dong)}</span></th>`).join("")}</tr>
    ${rows.map(([label,fn])=>
      `<tr><td class="muted">${label}</td>${picked.map(c=>`<td>${fn(c)}</td>`).join("")}</tr>`).join("")}
    </table></div>
    <div class="card"><div id="cchart" style="height:340px"></div></div>`;

  // 84환산가 + 2년 전 가격을 나란히 막대로
  Plotly.newPlot("cchart",[
    {type:"bar",name:"2년 전",x:picked.map(c=>c.nm),
     y:picked.map(c=>c.p2?c.p2/10000:null),marker:{color:"#9aa1ab"}},
    {type:"bar",name:"현재(84환산)",x:picked.map(c=>c.nm),
     y:picked.map(c=>c.p84/10000),marker:{color:picked.map(c=>gcolor(c.g))}},
  ],{barmode:"group",margin:{l:46,r:10,t:30,b:60},
     yaxis:{title:"억"},legend:{orientation:"h",y:1.12},
     paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",
     font:{color:getComputedStyle(document.body).color}},
    {displayModeBar:false,responsive:true});
}

function renderReport(){
  el("s-report").innerHTML=`<div class="card"><h2>📰 일일 변동 리포트</h2>
    <div class="muted">매일 아침 자동 생성 · 새 거래 / 급지 변동 / 84환산가 변동</div></div>
    <div class="card scroll">${D.report}</div>`;
}

function renderCalc(){
  const REG=["강남구","서초구","송파구","용산구"];
  el("s-calc").innerHTML=`<div class="card"><h2>💰 자금 시뮬레이터</h2>
    <div class="muted">LTV·DSR 기준 대출한도와 진입 가능 여부 (개략 추정)</div>
    <div class="row"><div><label>보유 현금(만원)</label><input id="cash" type="number" placeholder="예: 50000" step="1000"></div>
    <div><label>연소득(만원)</label><input id="inc" type="number" placeholder="예: 8000" step="500"></div></div>
    <div class="row"><div><label>매매가(만원)</label><input id="price" type="number" placeholder="예: 150000" step="1000"></div>
    <div><label>지역</label><select id="reg">
      <option value="">비규제지역 (LTV 70%)</option>
      ${Object.keys(D.regs||{}).sort().map(g=>`<option value="${g}">${g} · 투기과열 (50%)</option>`).join("")}
    </select></div></div>
    <div class="row"><div><label>금리(%)</label><input id="rate" type="number" placeholder="미입력시 4.5" step="0.1"></div>
    <div><label>기간(년)</label><input id="yrs" type="number" placeholder="미입력시 30" step="5"></div></div>
    <div class="row"><div><label>시나리오</label><select id="mode"><option>실거주 매수</option><option>갭투자(전세 레버리지)</option></select></div>
    <div><label>전세가(만원, 갭투자시)</label><input id="jeonse" type="number" placeholder="예: 75000" step="1000"></div></div>
    </div><div class="card" id="cres"></div>`;
  const num=id=>{const v=el(id).value.trim();return v===""?null:+v;};
  const run=()=>{
    const cash=num("cash"), inc=num("inc"), price=num("price"), jeonse=num("jeonse"),
      ltv=el("reg").value?0.5:0.7,   // 규제지역(투기과열) 선택 시 50%
      rate=(num("rate")??4.5)/100, yrs=num("yrs")??30, mode=el("mode").value;

    // 필요한 값이 비어 있으면 계산하지 않는다 (0으로 계산해 엉뚱한 결과를 보이지 않도록)
    const need_fields = mode==="실거주 매수"
      ? [["보유 현금",cash],["연소득",inc],["매매가",price]]
      : [["보유 현금",cash],["매매가",price],["전세가",jeonse]];
    const missing = need_fields.filter(([,v])=>v===null||isNaN(v)).map(([k])=>k);
    if(missing.length){
      el("cres").innerHTML=`<div class="muted">👆 ${missing.join(", ")} 을(를) 입력하면 계산됩니다.</div>`;
      return;
    }

    const tax=price<=60000?price*0.011:price<=90000?price*0.022:price*0.033;
    let need,loan=0,dsrL=0,ltvL=0;
    if(mode==="실거주 매수"){
      const mr=rate/12,n=yrs*12,f=mr===0?1/n:mr/(1-Math.pow(1+mr,-n));
      dsrL=inc*0.40/(f*12); ltvL=price*ltv; loan=Math.min(dsrL,ltvL);
      need=price+tax-loan;
    }else{ need=price-jeonse+tax; }
    const short=need-cash, ok=short<=0;
    el("cres").innerHTML=`
      ${mode==="실거주 매수"?`<div>대출 가능 <span class="big">${eok(loan)}</span>
        <div class="muted">DSR한도 ${eok(dsrL)} / LTV한도 ${eok(ltvL)} 중 작은 값</div></div><hr style="border:0;border-top:1px solid var(--line);margin:10px 0">`:""}
      <div class="row"><div>취득세(개략)<div class="big">${eok(tax)}</div></div>
      <div>필요 현금<div class="big">${eok(need)}</div></div></div>
      <div style="margin-top:12px" class="${ok?'ok':'no'}">
        ${ok?`✅ 진입 가능 — 여유 ${eok(-short)}`:`❌ 진입 어려움 — ${eok(short)} 부족`}</div>
      <div class="muted" style="margin-top:8px">대출한도 = min(DSR 40%, LTV). 취득세는 1주택 개략 추정.
        실제 심사(스트레스DSR·중과세)와 다를 수 있습니다.</div>`;
  };
  ["cash","inc","price","reg","rate","yrs","mode","jeonse"].forEach(id=>el(id).oninput=run);
  run();
}

fetch("data.json").then(r=>r.json()).then(d=>{
  D=d;
  const mt=el("meta");
  const short=n=>n>=10000?(n/10000).toFixed(n>=100000?0:1).replace(/\.0$/,"")+"만":n.toLocaleString();
  mt.innerHTML=
    `<span class="stat">실거래 <b>${short(d.meta.tx)}</b></span>`+
    `<span class="stat">단지 <b>${d.meta.complexes.toLocaleString()}</b></span>`+
    `<span class="stat">갱신 <b>${(d.meta.generated||"").slice(0,10)}</b></span>`;
  mt.title=`국토부 실거래가 ${d.meta.tx.toLocaleString()}건 · 단지 ${d.meta.complexes.toLocaleString()}개 · `
    +`수집기간 ${d.meta.period} · 갱신 ${d.meta.generated}`;
  nav(); renderGrade(); renderMap(); renderFlag(); renderSearch();
  renderCmp(); renderRedev(); renderReport(); renderCalc();
  drawMap();   // 지도가 첫 탭이므로 로드 직후 바로 그린다
}).catch(e=>{el("meta").textContent="데이터 로드 실패: "+e});
</script>
</body>
